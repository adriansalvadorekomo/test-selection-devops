services:
  db:
    image: postgres:15
    container_name: odoo-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - odoo-private
    restart: unless-stopped

  odoo:
    image: odoo:17
    container_name: odoo-app
    depends_on:
      - db
    environment:
      - HOST=db
      - PORT=5432
      - USER=${DB_USER}
      - PASSWORD=${DB_PASSWORD}
    volumes:
      - odoo-filestore:/var/lib/odoo
    ports:
      - "8069:8069"
    networks:
      - odoo-private
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: odoo-nginx
    depends_on:
      - odoo
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - odoo-private
    restart: unless-stopped

volumes:
  postgres-data:
  odoo-filestore:

networks:
  odoo-private:
    driver: bridge
